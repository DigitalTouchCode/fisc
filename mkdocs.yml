site_name: FiscGuy Documentation
site_description: Modern Python Library for ZIMRA Fiscal Device Integration
site_url: https://digitaltouchcode.github.io/fisc/
repo_url: https://github.com/digitaltouchcode/fisc
docs_dir: docs
site_dir: site

nav:
  - Home: index.md
  - Installation: installation.md
  - Receipt Types: receipt-types.md
  - Fiscal Counters: fiscal-counters.md
  - Closing Day: closing-day.md
  - Certificate Management: certificate-management.md
  - Error Reference: error-reference.md
  - Changelog: changelog.md
  - Contributing: contributing.md

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest
    - search.highlight
  language: en
  font:
    text: SF Pro Display
    code: SF Mono

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [fiscguy]

markdown_extensions:
  - codehilite
  - admonition
  - toc:
      permalink: true

extra:
  version: 0.1.6
  css:
    - stylesheets/extra.css
